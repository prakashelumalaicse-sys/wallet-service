databaseChangeLog:
  - changeSet:
      id: 001-create-wallet-table
      author: codex
      changes:
        - createTable:
            tableName: wallet
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
